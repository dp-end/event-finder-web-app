name: event_finder
description: "A professional Event Finder application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # İkon ve Splash paketleri
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

# Telefon ikon ayarları
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

# Açılış ekranı (Splash) ayarları
flutter_native_splash:
  color: "#ffffff"
  image: assets/logo.png
  android: true
  ios: true
  fullscreen: true
  size: 500

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png