<div class="sidebar-overlay" [class.active]="isOpen" (click)="closeMenu()"></div>

<aside class="dark-sidebar" [class.active]="isOpen">

  <div class="brand-section">
    <div class="logo-box">
      <svg viewBox="0 0 24 24" fill="white" width="20" height="20">
        <path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72l5 2.73 5-2.73v3.72z"/>
      </svg>
    </div>
    <h2>CampusHub</h2>
  </div>

  @if (isClubUser) {
    <button class="create-btn" routerLink="/create-event" (click)="closeMenu()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Etkinlik Oluştur
    </button>
  }

  <nav class="nav-links">
    <a routerLink="/home" routerLinkActive="active" (click)="closeMenu()">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      Ana Sayfa
    </a>

    <a routerLink="/notifications" routerLinkActive="active" class="nav-item-between" (click)="closeMenu()">
      <div class="left-group">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        Bildirimler
      </div>
      @if (unreadCount > 0) {
        <span class="badge">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
      }
    </a>

    <a routerLink="/tickets" routerLinkActive="active" (click)="closeMenu()">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="7" width="20" height="10" rx="2" ry="2"></rect>
        <path d="M6 7v10"></path>
        <path d="M18 7v10"></path>
      </svg>
      Biletlerim
    </a>

    <a routerLink="/profile" routerLinkActive="active" (click)="closeMenu()">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      Profil
    </a>

    <a routerLink="/settings" routerLinkActive="active" (click)="closeMenu()">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0 .33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
      Ayarlar
    </a>
  </nav>

  <div class="user-footer">
    @if (user) {
      <div class="user-info-group">
        <div class="avatar">{{ initials }}</div>
        <div class="user-details">
          <h4>{{ fullName }}</h4>
          <p>{{ user.email }}</p>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" title="Çıkış Yap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    } @else {
      <a routerLink="/login" class="login-link" (click)="closeMenu()">Giriş Yap</a>
    }
  </div>

</aside>
