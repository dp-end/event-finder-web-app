<div class="register-container">
  <div class="register-card">

    <div class="header-section">
      <button class="back-btn" (click)="goBack()">
        <i class="arrow-left">←</i>
      </button>
      <div class="title-group">
        <h2>Öğrenci Kaydı</h2>
        <p>Aramıza katıl ve etkinlikleri keşfet</p>
      </div>
    </div>
     <div *ngIf="errorMessage" class="error-container global-error" style="background-color: #ffe6e6; color: #d8000c; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-size: 14px; border: 1px solid #ffcccc;">
      {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="success-container" style="background-color: #dff0d8; color: #3c763d; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-size: 14px; border: 1px solid #d6e9c6;">
      {{ successMessage }}
    </div>

    <form [formGroup]="studentForm" (ngSubmit)="onSubmit()">

      <div class="form-row">
        <div class="form-group half-width">
          <label>Ad</label>
          <input type="text" formControlName="firstName" placeholder="Adınız">
        </div>
        <div class="form-group half-width">
          <label>Soyad</label>
          <input type="text" formControlName="lastName" placeholder="Soyadınız">
        </div>
      </div>

      <div class="form-group">
        <label>Üniversite</label>
        <input type="text" formControlName="university" placeholder="Üniversitenizi yazın">
      </div>

      <div class="form-group">
        <label>Bölüm</label>
        <input type="text" formControlName="department" placeholder="Okuduğunuz bölüm">
      </div>

      <div class="form-group">
        <label>E-posta Adresi</label>
        <input type="email" formControlName="email" placeholder="ornek@edu.tr">
      </div>

      <div class="form-group">
        <label>Şifre</label>
        <input type="password" formControlName="password" placeholder="En az 8 karakter">
      </div>

      <div class="form-group">
        <label>Şifre Tekrar</label>
        <input type="password" formControlName="confirmPassword" placeholder="Şifrenizi tekrar girin">
        <small class="error-msg" *ngIf="studentForm.get('confirmPassword')?.hasError('mismatch') && studentForm.get('confirmPassword')?.touched">
          Şifreler eşleşmiyor!
        </small>
      </div>

      <button type="submit" class="submit-btn" [disabled]="studentForm.invalid">
        Kaydı Tamamla
      </button>

      <div class="footer-link">
        <span>Zaten hesabın var mı? </span>
        <a routerLink="/login">Giriş Yap</a>
      </div>
    </form>
  </div>
</div>
